# PostgreSQL 部署示例（自带 postgres 服务）。
# 个人轻量部署推荐单容器 SQLite（无需 compose），见 README「部署」一节：
#   docker run -d -p 3001:3000 -e GATEWAY_API_KEY=your-key \
#     -v llm-relay-data:/app/data ghcr.io/gojam11/llmrelayservice:main
# 注意：数据库方言（PostgreSQL / SQLite）首次部署选定后不可切换，数据互不迁移。
services:
  app:
    image: ghcr.io/gojam11/llmrelayservice:main
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lrs
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:?GATEWAY_API_KEY is required}
      PASSWORD: ${PASSWORD:-}
      DEBUG_DB_MAX_RECORDS: ${DEBUG_DB_MAX_RECORDS:-50000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lrs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lrs"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
