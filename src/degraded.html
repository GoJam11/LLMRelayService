<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库迁移失败 - LLM Relay</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 32px;
      border: 1px solid #333;
    }
    h1 { color: #ff6b6b; margin: 0 0 16px; font-size: 24px; }
    .error-box {
      background: #2a1a1a;
      border-left: 4px solid #ff6b6b;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 14px;
      color: #ff9999;
      word-break: break-word;
    }
    h2 { color: #fff; font-size: 18px; margin: 24px 0 12px; }
    ol { padding-left: 20px; line-height: 1.8; }
    li { margin-bottom: 8px; }
    code {
      background: #2a2a2a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      color: #66d9ef;
    }
    pre {
      background: #2a2a2a;
      padding: 12px 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      color: #a6e22e;
    }
    .note {
      margin-top: 20px;
      padding: 12px;
      background: #1a2a1a;
      border-left: 4px solid #4ecdc4;
      border-radius: 4px;
      font-size: 14px;
      color: #8ecae6;
    }
    .danger-zone {
      margin-top: 24px;
      padding: 20px;
      background: #2a1a1a;
      border: 1px solid #ff6b6b;
      border-radius: 8px;
    }
    .danger-zone h2 { color: #ff6b6b; margin-top: 0; }
    .danger-zone p { color: #ff9999; margin: 8px 0 16px; }
    .btn-danger {
      background: #ff6b6b;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-danger:hover { background: #ff5252; }
    .btn-danger:disabled {
      background: #666;
      cursor: not-allowed;
    }
    .result {
      margin-top: 12px;
      padding: 12px;
      border-radius: 6px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      display: none;
    }
    .result.success {
      display: block;
      background: #1a2a1a;
      border-left: 4px solid #4ecdc4;
      color: #a6e22e;
    }
    .result.error {
      display: block;
      background: #2a1a1a;
      border-left: 4px solid #ff6b6b;
      color: #ff9999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>数据库迁移失败</h1>
    <div class="error-box">{{ERROR}}</div>

    <div class="note" style="margin-bottom: 20px;">
      <strong>建议：</strong>执行重置前，请先备份数据库。
    </div>

    <div class="danger-zone">
      <h2>快速修复</h2>
      <p>点击下方按钮将<strong>清除所有现有数据</strong>并重新创建数据库表。此操作<strong>不可撤销</strong>。</p>
      <button class="btn-danger" id="resetBtn" onclick="resetDatabase()">清除数据并重建数据库</button>
      <div class="result" id="result"></div>
    </div>

    <div class="note">
      <strong>提示：</strong>服务当前处于降级模式。API 请求可能不可用，但健康检查端点仍可访问。
    </div>
  </div>

  <script>
    async function resetDatabase() {
      const btn = document.getElementById('resetBtn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = '处理中...';
      result.className = 'result';
      result.textContent = '';

      try {
        const res = await fetch('/api/db/reset', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          result.className = 'result success';
          result.textContent = '成功：' + data.message + '\n正在刷新页面...';
          setTimeout(() => location.reload(), 2000);
        } else {
          result.className = 'result error';
          result.textContent = '失败：' + (data.error || '未知错误');
        }
      } catch (err) {
        result.className = 'result error';
        result.textContent = '失败：' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '清除数据并重建数据库';
      }
    }
  </script>
</body>
</html>
